version: '3.8'

services:
  # 1. OpenTelemetry Collector (Centralizador de Telemetria)    
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: iluminati-otel-collector 
    command: ["--config=/etc/otel-collector-config.yaml"] 
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - jaeger 
      - prometheus 
      - loki 
    networks:
      - iluminati-net 
    
  # 2. Jaeger (Armazenamento e UI de Traces)
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: iluminati-jaeger
    ports:
      - "16686:16686" 
      - "14268:14268"
    networks:
      - iluminati-net

  # 3. Prometheus (Armazenamento de Métricas)
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: iluminati-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - iluminati-net

  # 4. Loki (Armazenamento de Logs Estruturados)
  loki:
    image: grafana/loki:2.9.0
    container_name: iluminati-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - iluminati-net
    
  # 5. Grafana (Painel de Visualização Geral) 
  grafana: 
    image: grafana/grafana:10.2.0
    container_name: iluminati-grafana
    ports:
      - "3200:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - jaeger
      - loki
    networks:
      - iluminati-net
  
networks:
  iluminati-net:
    driver: bridge