services:
  # 1. OpenTelemetry Collector (Centralizador de Telemetria)    
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: iluminati-otel-collector 
    command: ["--config=/etc/otel-collector-config.yaml"] 
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      - jaeger 
      - prometheus 
      - loki 
    networks:
      - iluminati-net 
    
  # 2. Jaeger (Armazenamento e UI de Traces)
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: iluminati-jaeger
    ports:
      - "16686:16686" 
      - "14268:14268"
    networks:
      - iluminati-net

  # 3. Prometheus (Armazenamento de Métricas)
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: iluminati-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-rules.yml:/etc/prometheus/rules/rules.yml
    ports:
      - "9090:9090"
    networks:
      - iluminati-net

  # 4. Loki (Armazenamento de Logs Estruturados)
  loki:
    image: grafana/loki:2.9.0
    container_name: iluminati-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - iluminati-net
    
  # 5. PostgreSQL (Banco de Dados Principal)
  postgres:
    image: postgres:16-alpine
    container_name: iluminati-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iluminati}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iluminati_pass}
      POSTGRES_DB: ${POSTGRES_DB:-iluminati_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iluminati-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iluminati}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. Redis (Cache e Rate Limiting Storage)
  redis:
    image: redis:7.2-alpine
    container_name: iluminati-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-iluminati_redis}
    ports:
      - "6379:6379"
    networks:
      - iluminati-net

  # 6. Grafana (Painel de Visualização Geral)
  grafana: 
    image: grafana/grafana:10.2.0
    container_name: iluminati-grafana
    ports:
      - "3200:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceToMetrics
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - jaeger
      - loki
    networks:
      - iluminati-net
  
  # 8. Alertmanager (Roteamento de Alertas)
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: iluminati-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - iluminati-net

  # 7. RabbitMQ (Message Broker — eventos assíncronos)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: iluminati-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-iluminati}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-iluminati_rabbit}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - iluminati-net

  # ─── NestJS Apps ──────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: gateway
    container_name: iluminati-gateway
    image: iluminati/gateway
    env_file: ../.env
    environment:
      PORT: "3000"
      OTEL_SERVICE_NAME: gateway
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - iluminati-net
    restart: unless-stopped

  auth:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: auth
    container_name: iluminati-auth
    image: iluminati/auth
    env_file: ../.env
    environment:
      PORT: "3002"
      OTEL_SERVICE_NAME: auth
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iluminati-net
    restart: unless-stopped

  catalogo:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: catalogo
    container_name: iluminati-catalogo
    image: iluminati/catalogo
    env_file: ../.env
    environment:
      PORT: "3001"
      OTEL_SERVICE_NAME: catalogo
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iluminati-net
    restart: unless-stopped

  pedidos:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: pedidos
    container_name: iluminati-pedidos
    image: iluminati/pedidos
    env_file: ../.env
    environment:
      PORT: "3003"
      OTEL_SERVICE_NAME: pedidos
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iluminati-net
    restart: unless-stopped

  pagamentos:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: pagamentos
    container_name: iluminati-pagamentos
    image: iluminati/pagamentos
    env_file: ../.env
    environment:
      PORT: "3004"
      OTEL_SERVICE_NAME: pagamentos
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iluminati-net
    restart: unless-stopped

  seller:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        APP: seller
    container_name: iluminati-seller
    image: iluminati/seller
    env_file: ../.env
    environment:
      PORT: "3005"
      OTEL_SERVICE_NAME: seller
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iluminati-net
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: iluminati-web
    image: iluminati/web
    environment:
      NUXT_PUBLIC_API_URL: http://gateway:3000
    ports:
      - "3010:3010"
    depends_on:
      - gateway
    networks:
      - iluminati-net
    restart: unless-stopped

networks:
  iluminati-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data: