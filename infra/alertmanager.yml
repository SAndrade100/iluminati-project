global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertas@iluminati.com'

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - matchers:
        - severity = critical
      receiver: 'critical'
      repeat_interval: 15m

receivers:
  - name: 'default'
    # Configure seu webhook/Slack/email aqui
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#alertas'

  - name: 'critical'
    # webhook_configs:
    #   - url: 'http://seu-webhook/critico'

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'service']
